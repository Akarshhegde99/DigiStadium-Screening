spring.application.name=backend
server.port=${PORT:8080}

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/harveyscafe_ipl}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:harveysCafeSuperSecretKeyForJwtAuthenticationWhichShouldBeLongEnoughToSurpass256Bits}
app.jwt.expiration-ms=604800000

# Stripe Configuration (Optional)
stripe.api.key=sk_test_replace_with_real_key_or_leave_mocked

# Load Initial Data Loader Flag
app.data-loader.enabled=true
