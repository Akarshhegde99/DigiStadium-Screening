spring.application.name=backend
server.port=8080

# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/harveyscafe_ipl?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# JWT Configuration
app.jwt.secret=harveysCafeSuperSecretKeyForJwtAuthenticationWhichShouldBeLongEnoughToSurpass256Bits
app.jwt.expiration-ms=604800000

# Stripe Configuration (Optional)
stripe.api.key=sk_test_replace_with_real_key_or_leave_mocked

# Load Initial Data Loader Flag
app.data-loader.enabled=true
